kafka.bootstrap.servers=localhost:9092
kafka.consumer.group.id=flink-metrics-processor
schema.registry.url=http://localhost:8081
users.events.topic=users.events
timescaledb.url=jdbc:postgresql://localhost:5433/metricsdb
timescaledb.username=metrics
timescaledb.password=metrics
minio.endpoint=http://localhost:9000
minio.access.key=minioadmin
minio.secret.key=minioadmin
minio.bucket=metrics-parquet
parquet.output.path=s3://metrics-parquet/aggregated
# Pipeline 2: raw log lines are written as rolling .txt files under this HDFS path.
# The Spark job reads from here and writes Parquet to /metrics/logs/parquet/.
hdfs.logs.output.path=hdfs://namenode:9000/metrics/logs/raw
flink.parallelism=2
