# HDFS paths — override at runtime by passing args[0] and args[1] to spark-submit.
# These defaults match the docker-compose Hadoop container hostnames.
hdfs.logs.input.path=hdfs://namenode:9000/metrics/logs/raw
hdfs.logs.output.path=hdfs://namenode:9000/metrics/logs/parquet
hdfs.external.input.path=hdfs://namenode:9000/metrics/external/raw
hdfs.external.output.path=hdfs://namenode:9000/metrics/external/parquet
