<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Distributed Metrics System — Interactive Learning Guide</title>
<style>
:root {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#242736; --border:#2e3149;
  --text:#e2e8f0; --muted:#8892a4; --primary:#6366f1;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:20px;flex-shrink:0}
header h1{font-size:17px;font-weight:700;white-space:nowrap}
.tabs{display:flex;gap:3px}
.tab-btn{padding:6px 14px;border-radius:6px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:13px;transition:all .15s}
.tab-btn:hover{background:var(--surface2);color:var(--text)}
.tab-btn.active{background:var(--surface2);color:#818cf8}
.main{flex:1;display:flex;overflow:hidden}
.tab-pane{display:none;flex:1;overflow:hidden}
.tab-pane.active{display:flex}

/* ARCH TAB */
.diagram-wrap{flex:1;overflow:auto;padding:16px;position:relative}
.side-panel{width:300px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;padding:18px}
.side-panel .hint{color:var(--muted);font-size:13px;text-align:center;margin-top:50px;line-height:1.8}
.node{cursor:pointer}
.node rect,.node ellipse{transition:filter .15s}
.node:hover rect,.node:hover ellipse,.node.sel rect,.node.sel ellipse{filter:brightness(1.4) drop-shadow(0 0 6px currentColor)}

/* JOURNEY TAB */
#journey-pane{flex-direction:column;overflow:hidden}
.journey-bar{padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.journey-bar span{font-size:12px;color:var(--muted);margin-right:4px}
.jbtn{padding:7px 13px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-size:12px;transition:all .15s}
.jbtn.active{border-color:#6366f1;color:#818cf8;background:rgba(99,102,241,.1)}
.jbtn:hover{border-color:#6366f1}
.journey-body{flex:1;overflow-y:auto;padding:24px}
.step-list{list-style:none;counter-reset:s}
.step-list li{counter-increment:s;display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.7}
.step-list li:last-child{border-bottom:none}
.step-list li::before{content:counter(s);min-width:26px;height:26px;border-radius:50%;background:#6366f1;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.step-title{font-weight:600;margin-bottom:3px;font-size:14px}

/* COMPONENTS TAB */
#components-pane{overflow-y:auto;flex-direction:column;padding:20px}
.comp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.comp-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px}
.comp-card h3{font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.comp-card p{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:12px}
.prop-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:12px}
.prop-row:last-child{border-bottom:none}
.prop-key{color:var(--muted)}
.prop-val{font-family:monospace;color:#7dd3fc;text-align:right}

/* KAFKA TAB */
#kafka-pane{overflow-y:auto;flex-direction:column;padding:20px}
.kafka-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(460px,1fr));gap:14px}
.kafka-card{background:var(--surface);border:1px solid rgba(16,185,129,.3);border-radius:10px;padding:18px}
.kafka-card h3{font-size:14px;font-family:monospace;color:#34d399;margin-bottom:10px}
.flow-line{display:flex;align-items:center;gap:10px;font-size:12px;margin-bottom:10px}
.prod{color:#60a5fa}.cons{color:#f87171}.arr{color:var(--muted)}
.kafka-card p{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:12px}
.fields{background:var(--surface2);border-radius:7px;padding:10px;border:1px solid var(--border)}
.fields .label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.field{font-size:11px;font-family:monospace;color:#c4b5fd;padding:2px 0}

/* Badges */
.badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600}
.b-blue{background:rgba(59,130,246,.15);color:#60a5fa}
.b-green{background:rgba(16,185,129,.15);color:#34d399}
.b-orange{background:rgba(245,158,11,.15);color:#fbbf24}
.b-red{background:rgba(239,68,68,.15);color:#f87171}
.b-purple{background:rgba(139,92,246,.15);color:#a78bfa}
.b-teal{background:rgba(20,184,166,.15);color:#2dd4bf}
.b-yellow{background:rgba(234,179,8,.15);color:#facc15}
.b-gray{background:var(--surface2);color:var(--muted)}

code{font-family:monospace;font-size:11px;background:var(--surface2);padding:1px 5px;border-radius:3px;color:#7dd3fc}
pre{background:var(--surface2);padding:11px;border-radius:7px;font-size:11px;overflow-x:auto;color:#a5f3fc;line-height:1.6;border:1px solid var(--border);margin-top:10px}
</style>
</head>

const JOURNEYS = [
  {title:"📊 Structured Metric Journey",sub:"How a metric event travels from your app to TimescaleDB",steps:[
    {icon:"🚀",t:"Client sends metric",d:"Your app calls <code>POST /api/v1/metrics</code> on <b>metrics-collector</b> with JSON containing metricName, value, unit, serviceId, tags, and timestamp."},

    {icon:"📨",t:"Kafka buffers the event",d:"The event lands in one of 3 partitions based on serviceId hash. Kafka holds it for up to 7 days — it's a durable backpressure buffer between ingestion and processing."},
    {icon:"🔍",t:"Processor enriches it",d:"<b>StructuredMetricsConsumer</b> picks up the event, calls <b>EnrichmentService</b> which does a Caffeine-cached PostgreSQL lookup to resolve serviceName, team, environment, region from <code>service_metadata</code> table."},

    {icon:"⚡",t:"Flink Pipeline 1 reads & windows",d:"Flink reads from <b>metrics.normalized</b>, assigns event-time timestamps with a 5s watermark for late arrivals, keys by <code>serviceId:metricName</code>, and applies a <b>1-minute tumbling window</b>."},
    {icon:"🔄",t:"CDC broadcast enrichment",d:"Simultaneously, <b>CdcEnrichmentBroadcastFunction</b> joins each metric against broadcast state (populated from <b>cdc.public.service_metadata</b>). If a service was renamed in PostgreSQL, Flink sees it within seconds."},
    {icon:"📊",t:"Aggregation: sum/min/max/avg",d:"<b>MetricWindowAggregator</b> incrementally computes sum, min, max, count per window. On window close, <b>MetricWindowProcessFunction</b> stamps windowStartMs / windowEndMs."},
    {icon:"💾",t:"Dual sink — TimescaleDB + MinIO",d:"The aggregated result is forked: <b>TimescaleDbSink</b> does a JDBC upsert into the <code>metric_aggregates</code> hypertable. The same record is written as <b>Parquet to MinIO</b> via FileSink, partitioned by environment/date."},
    {icon:"🔎",t:"API Gateway serves the query",d:"A dashboard calls <code>GET /api/v1/query/timeseries?metricName=...&from=...&to=...</code>. API Gateway issues parameterized SQL against TimescaleDB's hypertable with partition pruning on <code>window_start</code>."},
  ]},
  {title:"📝 Raw Log Journey",sub:"How an unstructured log line becomes a queryable Parquet record in HDFS",steps:[
    {icon:"📋",t:"Log line arrives",d:"An app POSTs a raw UTF-8 log line to <code>POST /api/v1/logs</code> with <code>Content-Type: text/plain</code>. Batches are also accepted as a JSON array of strings."},
    {icon:"📤",t:"Published verbatim to Kafka",d:"<b>metrics-collector</b> publishes the raw string directly to <b>logs.raw</b> — no parsing at ingest. Parsing is expensive; keeping the collector fast is intentional."},
    {icon:"📨",t:"Kafka holds it durably",d:"<b>logs.raw</b> retains messages for 7 days. Even if Flink goes down, no log lines are lost — Flink resumes from its last checkpoint offset."},
    {icon:"⚡",t:"Flink Pipeline 2 writes to HDFS",d:"Flink reads raw strings from <b>logs.raw</b> and writes each line to HDFS using <code>FileSink&lt;String&gt;</code> with <code>SimpleStringEncoder</code>. Files are partitioned by <code>year/month/day/hour</code> via <code>DateTimeBucketAssigner</code>."},
    {icon:"🗂️",t:"HDFS accumulates hourly files",d:"Files appear at <code>/metrics/logs/raw/year=2024/month=01/day=15/hour=10/logs-*.txt</code>. Each file rolls after 5 minutes or 128 MB. Flink's checkpoint guarantees exactly-once file commits."},
    {icon:"🔥",t:"Spark job reads HDFS",d:"You submit the Spark job: <code>spark-submit --class SparkLogProcessor ...</code>. It calls <code>spark.read().option(\"recursiveFileLookup\",true).text(inputPath)</code> loading all .txt files as a DataFrame."},
    {icon:"🔬",t:"Regex parsing & filtering",d:"Spark applies <code>regexp_extract</code> to each row using the pattern <code>(timestamp) [(level)] [(service_id)] (message)</code>. Lines without a matching timestamp are dropped by <code>.filter(col(\"timestamp\").notEqual(\"\"))</code>."},
    {icon:"📅",t:"Date partition column derived",d:"<code>to_date(col(\"timestamp\"))</code> adds a <code>date</code> column. The DataFrame now has: timestamp, level, service_id, message, raw_line, date."},
    {icon:"💎",t:"Written as partitioned Parquet",d:"Spark writes to HDFS as Parquet with <code>.partitionBy(\"level\",\"date\")</code>. Result: <code>/metrics/logs/parquet/level=ERROR/date=2024-01-15/part-*.parquet</code> — queryable with Hive, Trino, or Spark SQL using partition pruning."},
  ]},
  {title:"🔄 CDC Enrichment Journey",sub:"How PostgreSQL changes flow into Flink's live broadcast state",steps:[
    {icon:"🗄️",t:"PostgreSQL WAL enabled",d:"PostgreSQL runs with <code>wal_level=logical</code>, <code>max_replication_slots=5</code>. Logical replication exposes row-level change events as a stream — prerequisite for Debezium."},
    {icon:"👁️",t:"Debezium watches service_metadata",d:"Debezium's PostgreSQL connector (in Kafka Connect) performs an initial snapshot of all <code>service_metadata</code> rows (operation <code>r</code>), then tails the WAL for ongoing changes."},
    {icon:"📡",t:"Change events → Kafka CDC topic",d:"Every INSERT, UPDATE, or DELETE on <code>service_metadata</code> produces a JSON event on <b>cdc.public.service_metadata</b> containing: operation (c/u/d/r), serviceId, and new row values."},
    {icon:"📻",t:"Flink broadcasts CDC events",d:"The CDC Kafka source is converted to a <b>BroadcastStream</b> using a <code>MapStateDescriptor&lt;String,CdcEvent&gt;</code>. Broadcast means every parallel Flink task slot receives every CDC event — no partitioning."},
    {icon:"🧠",t:"Broadcast state updated",d:"<b>CdcEnrichmentBroadcastFunction.processBroadcastElement()</b> updates the in-memory map: upsert for <code>c/u/r</code> operations, remove for <code>d</code> (delete). All task slots stay in sync."},
    {icon:"🔗",t:"Metrics enriched in-stream",d:"When a <code>NormalizedMetric</code> arrives, <code>processElement()</code> looks up the serviceId in broadcast state and overwrites serviceName/team/environment/region if a newer entry exists — zero DB calls in the aggregation hot path."},
    {icon:"✅",t:"Why this matters",d:"Without CDC: a service renamed in PostgreSQL would produce stale metrics until the Caffeine cache expires (10 min). With CDC: Flink's broadcast state reflects the change within seconds of the DB write."},

  {title:"🔵 Protobuf User Event Journey",sub:"How user data flows from the API Gateway to Flink with zero field-key overhead via Schema Registry",steps:[
    {icon:"📝",t:"Client POSTs a user event",d:"A service calls <code>POST /api/v1/users/events</code> on the <b>API Gateway</b> with a JSON body containing userId, eventType, serviceId, and optional properties. No Protobuf knowledge is needed on the client side."},
    {icon:"🔨",t:"Gateway builds a Protobuf message",d:"<b>UserEventPublisherService</b> constructs a <code>UserEvent</code> Protobuf message using the generated builder. Protobuf encodes only field numbers (1, 2, 3…) and values — no field names — shrinking the payload from ~150 bytes (JSON) to ~40 bytes."},
    {icon:"📌",t:"KafkaProtobufSerializer registers the schema",d:"On <b>first publish</b>, <code>KafkaProtobufSerializer</code> POSTs the <code>UserEvent</code> Protobuf file descriptor to <b>Confluent Schema Registry</b> (POST /subjects/users.events-value/versions). The registry returns a numeric schema ID, e.g. <code>3</code>. All future publishes of the same schema reuse that ID — no re-registration."},
    {icon:"📤",t:"Message published with Confluent wire format",d:"The serializer prepends a 5-byte Confluent header: <code>[0x00][schema-id 4B]</code>, followed by a varint message-index array and then the raw Protobuf bytes. The Kafka key is <code>userId</code> — all events for a given user land on the same partition."},
    {icon:"📨",t:"users.events topic buffers the message",d:"The Protobuf message lands on the <b>users.events</b> Kafka topic. Consumer lag here does not block ingestion — the API Gateway returns HTTP 202 immediately after the send."},
    {icon:"⚡",t:"Flink Pipeline 3 reads the message",d:"Flink's <code>KafkaSource&lt;UserEvent&gt;</code> (group id <code>flink-metrics-processor-user-events</code>) consumes from <b>users.events</b>. The source uses <b>ProtobufUserEventDeserializer</b> which implements <code>KafkaRecordDeserializationSchema</code>."},
    {icon:"🔍",t:"Deserializer reads the Confluent header",d:"The deserializer strips the 5-byte Confluent header, extracting the <b>schema ID</b>. It then checks its <b>operator-level cache</b> (<code>Map&lt;Integer, ParsedSchema&gt;</code>) for that schema ID."},
    {icon:"🧠",t:"Schema cached — registry call happens only once",d:"On <b>first message for a schema ID</b>: <code>CachedSchemaRegistryClient.getSchemaById(id)</code> makes one HTTP GET to Schema Registry and stores the result. The <code>ParsedSchema</code> is then also stored in the operator's local <code>schemaCache</code> map. <b>All subsequent messages</b> for the same schema ID are served purely from memory — zero HTTP calls."},
    {icon:"🔓",t:"Protobuf bytes deserialized to UserEvent",d:"After skipping the message-index varint array (a single <code>0x00</code> for a single-message .proto), the remaining bytes are passed to <code>UserEvent.parseFrom(protoBytes)</code>. The generated class handles all field mapping by field number."},
    {icon:"🔮",t:"Schema evolution is safe",d:"If a new field is added to the <code>UserEvent</code> proto (e.g. <code>string ip_address = 8</code>), a new schema version is registered with a new ID. Old Flink instances see the old ID and deserialize fine; new instances see the new ID. The Schema Registry enforces backward/forward compatibility rules."},

// ─── ANIMATION ────────────────────────────────────────────────────────────────
const PATHS_ANIM = [
  {id:'p0',col:'#3b82f6'},{id:'p1',col:'#3b82f6'},{id:'p2',col:'#34d399'},
  {id:'p3',col:'#34d399'},{id:'p4',col:'#34d399'},{id:'p6',col:'#34d399'},
  {id:'p8',col:'#fbbf24'},{id:'p9',col:'#fbbf24'},{id:'p11',col:'#a78bfa'},
  {id:'p12',col:'#14b8a6'},{id:'p13',col:'#eab308'},{id:'p14',col:'#ef4444'},
  {id:'p15',col:'#eab308'},{id:'p16',col:'#3b82f6'},{id:'p7',col:'#34d399'},
  {id:'p18',col:'#34d399'},{id:'p19',col:'#fbbf24'},
];
let pkts=[];
function spawnPkt(){
  const e=PATHS_ANIM[Math.floor(Math.random()*PATHS_ANIM.length)];
  const p=document.getElementById(e.id);
  if(!p)return;
  pkts.push({p,len:p.getTotalLength(),t:0,spd:0.004+Math.random()*0.004,col:e.col});
}
function animate(){
  const g=document.getElementById('pkts');
  if(!g){requestAnimationFrame(animate);return;}
  if(Math.random()<0.07)spawnPkt();
  g.innerHTML='';
  pkts=pkts.filter(k=>k.t<=1);
  pkts.forEach(k=>{
    k.t+=k.spd;
    if(k.t>1)return;
    const pt=k.p.getPointAtLength(k.t*k.len);
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',pt.x);c.setAttribute('cy',pt.y);c.setAttribute('r','4');
    c.setAttribute('fill',k.col);c.setAttribute('opacity',String(0.9-k.t*0.6));
    g.appendChild(c);
  });
  requestAnimationFrame(animate);
}

// ─── TAB SWITCHING ────────────────────────────────────────────────────────────
function showTab(name,btn){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(name+'-pane').classList.add('active');
  btn.classList.add('active');
  if(name==='components')buildComps();
  if(name==='kafka')buildKafka();
}

// ─── SIDE PANEL ───────────────────────────────────────────────────────────────
function pick(id){
  document.querySelectorAll('.node').forEach(n=>n.classList.remove('sel'));
  const nd=document.getElementById('n-'+id);
  if(nd)nd.classList.add('sel');
  const info=INFO[id];
  if(!info)return;
  const sp=document.getElementById('side-panel');
  sp.innerHTML=`
    <span class="badge ${info.bc}" style="margin-bottom:10px;display:inline-block">${info.badge}</span>
    <h2 style="font-size:16px;margin-bottom:10px">${info.title}</h2>
    <p style="font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:14px">${info.desc}</p>
    ${info.props?`<table style="width:100%;border-collapse:collapse;margin-bottom:12px">${info.props.map(([k,v])=>`<tr style="border-bottom:1px solid var(--border)"><td style="padding:5px 3px;font-size:11px;color:var(--muted)">${k}</td><td style="padding:5px 3px;font-size:11px;font-family:monospace;color:#7dd3fc;text-align:right">${v}</td></tr>`).join('')}</table>`:''}
    ${info.code?`<pre>${info.code}</pre>`:''}
  `;
}

// ─── JOURNEYS ─────────────────────────────────────────────────────────────────
function pickJourney(i,btn){
  document.querySelectorAll('.jbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderJourney(i);
}
function renderJourney(i){
  const j=JOURNEYS[i];
  document.getElementById('journey-body').innerHTML=`
    <div style="margin-bottom:22px">
      <h2 style="font-size:22px;margin-bottom:6px">${j.title}</h2>
      <p style="color:var(--muted);font-size:13px">${j.sub}</p>
    </div>
    <ol class="step-list">${j.steps.map(s=>`<li><div><div class="step-title">${s.icon} ${s.t}</div><div style="color:var(--muted)">${s.d}</div></div></li>`).join('')}</ol>
  `;
}

// ─── COMPONENTS ───────────────────────────────────────────────────────────────
function buildComps(){
  const g=document.getElementById('comp-grid');
  if(g.childElementCount)return;
  g.innerHTML=COMPS.map(c=>`
    <div class="comp-card">
      <h3>${c.title}<span class="badge ${c.bc}">${c.badge}</span>${c.port?`<span class="badge b-gray">:${c.port}</span>`:''}</h3>
      <p>${c.desc}</p>
      <div>${c.rows.map(([k,v])=>`<div class="prop-row"><span class="prop-key">${k}</span><span class="prop-val">${v}</span></div>`).join('')}</div>
    </div>`).join('');
}

// ─── KAFKA TOPICS ─────────────────────────────────────────────────────────────
function buildKafka(){
  const g=document.getElementById('kafka-grid');
  if(g.childElementCount)return;
  g.innerHTML=KTOPICS.map(t=>`
    <div class="kafka-card">
      <h3>${t.name}</h3>
      <div class="flow-line"><span class="prod">▶ ${t.prod}</span><span class="arr">→</span><span class="cons">${t.cons} ▶</span></div>
      <p>${t.why}</p>
      <div style="display:flex;gap:10px;margin-bottom:10px;font-size:11px">
        <div><span style="color:var(--muted)">Key: </span><code>${t.key}</code></div>
        <div><span style="color:var(--muted)">Value: </span><code>${t.val}</code></div>
      </div>
      <div class="fields"><div class="label">Message Fields</div>${t.fields.map(f=>`<div class="field">${f}</div>`).join('')}</div>
    </div>`).join('');
}

renderJourney(0);
animate();
