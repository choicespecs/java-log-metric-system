name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from the Actions tab

# Required permissions for the modern Pages deployment API
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; queued runs wait rather than cancel.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Prevent GitHub's Jekyll processor from mangling paths or ignoring
      # files that start with underscores.
      - name: Disable Jekyll
        run: touch docs/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      # Upload the entire docs/ directory as the Pages artifact.
      # The root of that directory becomes the root of the published site:
      #   docs/index.html          → https://<user>.github.io/<repo>/
      #   docs/learning-guide.html → https://<user>.github.io/<repo>/learning-guide.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
