server:
  port: 8083

spring:
  application:
    name: metrics-api-gateway
  datasource:
    url: jdbc:postgresql://localhost:5433/metricsdb
    username: metrics
    password: metrics
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: metrics-parquet

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.metrics.gateway: INFO
    org.springframework.web: WARN
